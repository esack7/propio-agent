services:
  agent:
    build: .
    stdin_open: true
    tty: true
    environment:
      - FORCE_COLOR=3
      - TERM=${TERM:-xterm-256color}
      - COLORTERM=${COLORTERM:-truecolor}
    # Volume mounts are provided by the wrapper script (propio-sandbox)
    # to allow dynamic mounting of current working directory and user config
    extra_hosts:
      - "host.docker.internal:host-gateway"
